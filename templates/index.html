<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Password Checker | Cyber Security</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(0,0,0,0.6);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
            text-align: center;
            width: 350px;
            backdrop-filter: blur(10px);
        }

        h1 {
            margin-bottom: 20px;
            color: #00ffff;
        }

        input {
            width: 90%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #00ffff, #00c3ff);
            color: black;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px #00ffff;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
        }

    </style>
</head>
<body>

    <div class="container">

        <h1>🔐 Password Checker</h1>

        <form method="POST">

            <input 
                type="password" 
                name="password" 
                placeholder="ادخل كلمة المرور"
                required
            >

            <br>

            <button type="submit">
                فحص كلمة المرور
            </button>

        </form>

        {% if result %}
        <div class="result">
            {{ result }}
        </div>
        {% endif %}

        <div class="footer">
            Cyber Security Tool | Python Flask
        </div>

    </div>

</body>
</html>
